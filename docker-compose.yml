services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novel_writer
      POSTGRES_USER: novel_writer
      POSTGRES_PASSWORD: novel_writer_pass
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reference_novels:/app/reference_novels
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  postgres_data:
