services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: novel_writer
      POSTGRES_USER: novel_writer
      POSTGRES_PASSWORD: novel_writer_pass
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 数据库端口不对外暴露，仅容器内部使用
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_writer -d novel_writer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8084:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reference_novels:/app/reference_novels
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://172.23.0.1:7890
      - HTTPS_PROXY=http://172.23.0.1:7890
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

volumes:
  postgres_data:
