services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novel_writer}
      POSTGRES_USER: ${POSTGRES_USER:-novel_writer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 数据库端口不对外暴露，仅容器内部使用
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-novel_writer} -d $${POSTGRES_DB:-novel_writer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - public_network

  backend:
    container_name: novel-writer-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8084:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reference_novels:/app/reference_novels
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://172.18.0.1:7890
      - HTTPS_PROXY=http://172.18.0.1:7890
      - NO_PROXY=yibuapi.com,localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,os; os.environ.pop('HTTP_PROXY',None); os.environ.pop('HTTPS_PROXY',None); os.environ['no_proxy']='localhost'; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      public_network:
        aliases:
          - novel-writer-api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8083:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - public_network

volumes:
  postgres_data:

networks:
  public_network:
    external: true
    name: public_server_network
