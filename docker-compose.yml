services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novel_writer}
      POSTGRES_USER: ${POSTGRES_USER:-novel_writer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    mem_limit: 384m
    mem_reservation: 128m
    oom_score_adj: -100
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=8MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-novel_writer} -d $${POSTGRES_DB:-novel_writer}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - public_network

  backend:
    container_name: novel-writer-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    mem_limit: 512m
    mem_reservation: 256m
    ports:
      - "127.0.0.1:18012:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./reference_novels:/app/reference_novels
      - ./script_rubric:/app/script_rubric
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - NO_PROXY=yibuapi.com,api.deepseek.com,.deepseek.com,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "unset HTTP_PROXY HTTPS_PROXY && python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/\", timeout=3)'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      public_network:
        aliases:
          - novel-writer-api

  frontend:
    container_name: novel-writer-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    mem_limit: 64m
    mem_reservation: 32m
    ports:
      - "127.0.0.1:18011:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - public_network

volumes:
  postgres_data:

networks:
  public_network:
    external: true
    name: public_server_network
